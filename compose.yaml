services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: wenyuan
      POSTGRES_USER: wenyuan
      POSTGRES_PASSWORD: wenyuan
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wenyuan -d wenyuan"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
